# Source: ADAN-ID Sovereign Cloud Architect Agent
# Deployed: 2026-04-23 by Adnan Bhai

version: '3.9'

services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
      - auth-service
      - storage-service
    volumes:
      - ./nginx/cloud.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    networks:
      - adan-cloud-net

  api-gateway:
    build: ./api/gateway
    ports:
      - "3000:3000"
      - "3001:3001"
    env_file: .env
    depends_on:
      - auth-service
      - storage-service
    restart: unless-stopped
    networks:
      - adan-cloud-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth-service:
    build: ./auth
    ports:
      - "4000:4000"
    env_file: .env
    restart: unless-stopped
    networks:
      - adan-cloud-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  storage-service:
    build: ./storage
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - storage-data:/app/data
    restart: unless-stopped
    networks:
      - adan-cloud-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    networks:
      - adan-cloud-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - adan-cloud-net

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - adan-cloud-net

volumes:
  storage-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  adan-cloud-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16